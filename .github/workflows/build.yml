# build.yml — GitHub Actions workflow for LinkToGmail
# Triggers on every push to main (and manual dispatch).
# Builds an unsigned release APK and attaches it as both an artifact and a GitHub Release.

name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. Check out the repository
      - uses: actions/checkout@v4

      # 2. Set up JDK 17 (required by AGP 8.x)
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Set up Gradle
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.3'

      # 4. Build the debug APK (auto-signed with debug key — installable via sideload)
      - name: Build Debug APK
        run: gradle assembleDebug
        working-directory: .

      # 5. Upload APK as artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinkToGmail-APK
          path: app/build/outputs/apk/debug/app-debug.apk

      # 6. Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: LinkToGmail v${{ github.run_number }}
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
