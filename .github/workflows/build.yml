# build.yml — GitHub Actions workflow for LinkToGmail
# Triggers on every push to main (and manual dispatch).
# Builds an unsigned release APK and attaches it as both an artifact and a GitHub Release.

name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository
      - uses: actions/checkout@v4

      # 2. Set up JDK 17 (required by AGP 8.x)
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Install Android SDK command-line tools
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. Generate the Gradle wrapper jar (not committed to the repo)
      - name: Install Gradle wrapper jar
        run: gradle wrapper --gradle-version 8.3

      # 5. Ensure the wrapper script is executable on Linux
      - name: Make gradlew executable
        run: chmod +x gradlew

      # 6. Build the release APK (unsigned — no keystore needed for sideloading)
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # 7. Upload the APK so it can be downloaded from the Actions run page
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinkToGmail-APK
          path: app/build/outputs/apk/release/app-release-unsigned.apk

      # 8. Create a versioned GitHub Release so each build gets a permanent download URL
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: LinkToGmail v${{ github.run_number }}
          files: app/build/outputs/apk/release/app-release-unsigned.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
